<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Robux Giveaway</title>
    <style>
        body {
            background-color: black; /* Hintergrund immer schwarz */
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            background: #1a1a1a;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            border: 2px solid #333;
            width: 90%;
            max-width: 400px;
        }

        .step { display: none; }
        .active { display: block; }

        input {
            width: 80%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
            border: none;
        }

        button {
            background: #00ff00;
            color: black;
            border: none;
            padding: 10px 20px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 5px;
            text-transform: uppercase;
        }

        .abo-btn { background: #ff0000; color: white; text-decoration: none; display: inline-block; padding: 10px 20px; margin-bottom: 10px; border-radius: 5px; }

        #timer {
            font-size: 2em;
            color: #00ff00;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div id="step1" class="step active">
            <h2>STOPP! 🛑</h2>
            <p>Abonniere zuerst meinen Kanal:</p>
            <a href="DEIN_YOUTUBE_LINK?sub_confirmation=1" target="_blank" class="abo-btn" onclick="showNextBtn()">JETZT ABONNIEREN</a>
            <br>
            <button id="next1" style="display:none;" onclick="nextStep(2)">Ich habe abonniert</button>
        </div>

        <div id="step2" class="step">
            <h2>Roblox Daten</h2>
            <p>Gib deinen Namen ein, um teilzunehmen:</p>
            <input type="text" id="robloxName" placeholder="Roblox Benutzername">
            <br>
            <button onclick="nextStep(3)">Teilnehmen</button>
        </div>

        <div id="step3" class="step">
            <h2 style="color: #00ff00;">FERTIG! ✅</h2>
            <p>Du bist im Lostopf. Das Giveaway endet in:</p>
            <div id="timer">03:00:00:00</div>
            <p style="font-size: 0.8em; color: gray; margin-top: 20px;">Schließe diese Seite nicht, oder merke dir den Zeitpunkt!</p>
        </div>
    </div>

    <script>
        function showNextBtn() {
            document.getElementById('next1').style.display = 'inline-block';
        }

        function nextStep(stepNum) {
            // Alle Schritte ausblenden
            document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
            // Gewünschten Schritt einblenden
            document.getElementById('step' + stepNum).classList.add('active');

            if(stepNum === 3) {
                startTimer();
            }
        }

        function startTimer() {
            // Timer auf 3 Tage setzen
            let time = 3 * 24 * 60 * 60; 
            const timerDisplay = document.getElementById('timer');

            const interval = setInterval(() => {
                let days = Math.floor(time / (24 * 3600));
                let hours = Math.floor((time % (24 * 3600)) / 3600);
                let mins = Math.floor((time % 3600) / 60);
                let secs = time % 60;

                timerDisplay.innerHTML = 
                    (days < 10 ? "0" + days : days) + ":" +
                    (hours < 10 ? "0" + hours : hours) + ":" +
                    (mins < 10 ? "0" + mins : mins) + ":" +
                    (secs < 10 ? "0" + secs : secs);

                if (time <= 0) {
                    clearInterval(interval);
                    timerDisplay.innerHTML = "GEWINNER WIRD GEWÄHLT...";
                }
                time--;
            }, 1000);
        }
    </script>
</body>
</html>
