<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Robux Giveaway | Bananiel1616</title>
    <style>
        body {
            background-color: #000000;
            color: white;
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            background: #111111;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            border: 1px solid #333;
            width: 90%;
            max-width: 450px;
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.3);
        }

        .step { display: none; }
        .active { display: block; }

        h2 { color: #ff0000; margin-top: 0; font-size: 1.8em; }

        input {
            width: 100%;
            padding: 12px;
            margin: 15px 0;
            border-radius: 8px;
            border: 1px solid #444;
            background: #222;
            color: white;
            box-sizing: border-box;
            outline: none;
        }

        button, .abo-btn {
            background: #ff0000;
            color: white;
            border: none;
            padding: 15px 25px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 8px;
            text-decoration: none;
            display: inline-block;
            width: 100%;
            font-size: 1em;
            transition: 0.3s;
            margin-top: 10px;
        }

        button:hover, .abo-btn:hover { background: #cc0000; transform: scale(1.02); }

        #timer {
            font-size: 2.5em;
            color: #00ff00;
            margin: 20px 0;
            font-weight: bold;
            font-family: 'Courier New', Courier, monospace;
        }

        .success-msg { color: #00ff00; font-weight: bold; font-size: 1.3em; }
    </style>
</head>
<body>

    <div class="container">
        <div id="step1" class="step active">
            <h2>STOPP! 🛑</h2>
            <p>Abonniere meinen Kanal, um teilzunehmen:</p>
            <a href="https://youtube.com/@YTBananiel1616?sub_confirmation=1" target="_blank" class="abo-btn" onclick="document.getElementById('next1').style.display='block'">1. JETZT ABONNIEREN</a>
            <button id="next1" style="display:none;" onclick="nextStep(2)">2. WEITER ZUR TEILNAHME</button>
        </div>

        <div id="step2" class="step">
            <h2>DEIN ROBLOX NAME</h2>
            <p>Gib deinen Namen ein, um im Lostopf zu landen:</p>
            <input type="text" id="robloxName" placeholder="Roblox Benutzername...">
            <button onclick="finishRegistration()">JETZT TEILNEHMEN</button>
        </div>

        <div id="step3" class="step">
            <p class="success-msg">REGISTRIERT! ✅</p>
            <p>Der Gewinner wird gezogen in:</p>
            <div id="timer">00:00:00:00</div>
            <p style="font-size: 0.8em; color: #888; margin-top: 20px;">Die Auflösung gibt es auf YouTube bei <b>Bananiel1616</b>!</p>
        </div>
    </div>

    <script>
        // Ziel-Datum: 1. April 2026, 20:00 Uhr
        const globalEndTime = new Date(2026, 3, 1, 20, 0, 0).getTime(); 

        window.onload = function() {
            if (localStorage.getItem("hasJoined")) {
                showStep(3);
                startGlobalCountdown();
            }
        };

        function nextStep(stepNum) {
            showStep(stepNum);
        }

        function showStep(stepNum) {
            document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
            document.getElementById('step' + stepNum).classList.add('active');
        }

        function finishRegistration() {
            const name = document.getElementById('robloxName').value;
            if(name.length < 3) {
                alert("Bitte gib einen gültigen Namen ein!");
                return;
            }
            localStorage.setItem("hasJoined", "true");
            showStep(3);
            startGlobalCountdown();
        }

        function startGlobalCountdown() {
            const timerDiv = document.getElementById('timer');

            const x = setInterval(function() {
                const now = new Date().getTime();
                const distance = globalEndTime - now;

                if (distance <= 0) {
                    clearInterval(x);
                    timerDiv.innerHTML = "ZIEHUNG LÄUFT...";
                    timerDiv.style.color = "yellow";
                    return;
                }

                const days = Math.floor(distance / (1000 * 60 * 60 * 24));
                const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
                const seconds = Math.floor((distance % (1000 * 60)) / 1000);

                timerDiv.innerHTML = 
                    (days < 10 ? "0" + days : days) + ":" +
                    (hours < 10 ? "0" + hours : hours) + ":" +
                    (minutes < 10 ? "0" + minutes : minutes) + ":" +
                    (seconds < 10 ? "0" + seconds : seconds);
            }, 1000);
        }
    </script>
</body>
</html>
