<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Robux Giveaway | Bananiel1616</title>
    <style>
        /* Alles bleibt durchgehend Schwarz */
        body {
            background-color: #000000;
            color: white;
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            background: #111111;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            border: 1px solid #333;
            width: 90%;
            max-width: 450px;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.2);
        }

        .step { display: none; }
        .active { display: block; }

        h2 { color: #ff0000; margin-top: 0; }

        input {
            width: 100%;
            padding: 12px;
            margin: 15px 0;
            border-radius: 8px;
            border: 1px solid #444;
            background: #222;
            color: white;
            box-sizing: border-box;
        }

        button, .abo-btn {
            background: #ff0000;
            color: white;
            border: none;
            padding: 15px 25px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 8px;
            text-decoration: none;
            display: inline-block;
            width: 100%;
            font-size: 1em;
            transition: 0.3s;
        }

        button:hover, .abo-btn:hover { background: #cc0000; }

        #timer {
            font-size: 2.5em;
            color: #00ff00;
            margin: 20px 0;
            font-weight: bold;
            letter-spacing: 2px;
        }

        .success-msg { color: #00ff00; font-weight: bold; font-size: 1.2em; }
    </style>
</head>
<body>

    <div class="container">
        <div id="step1" class="step active">
            <h2>STOPP! 🛑</h2>
            <p>Du musst erst meinen Kanal abonnieren, um am Giveaway teilzunehmen:</p>
            <a href="https://youtube.com/@YTBananiel1616?sub_confirmation=1" target="_blank" class="abo-btn" onclick="document.getElementById('next1').style.display='block'">JETZT ABONNIEREN</a>
            <button id="next1" style="display:none; margin-top: 15px;" onclick="nextStep(2)">Ich habe abonniert!</button>
        </div>

        <div id="step2" class="step">
            <h2>DEIN NAME</h2>
            <p>Gib deinen Roblox-Benutzernamen ein:</p>
            <input type="text" id="robloxName" placeholder="Dein Roblox Name...">
            <button onclick="nextStep(3)">TEILNEHMEN</button>
        </div>

        <div id="step3" class="step">
            <p class="success-msg">FERTIG! ✅</p>
            <p>Du bist im Lostopf. Der Gewinner wird in diesem Zeitraum gezogen:</p>
            <div id="timer">03:00:00:00</div>
            <p style="font-size: 0.8em; color: #777;">Verpasse die Ziehung nicht auf meinem Kanal!</p>
        </div>
    </div>

    <script>
        function nextStep(stepNum) {
            document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
            document.getElementById('step' + stepNum).classList.add('active');

            if(stepNum === 3) {
                startCountdown();
            }
        }

        function startCountdown() {
            // Timer für 3 Tage (in Sekunden)
            let totalSeconds = 3 * 24 * 60 * 60; 
            const timerDiv = document.getElementById('timer');

            const x = setInterval(function() {
                let days = Math.floor(totalSeconds / (24 * 60 * 60));
                let hours = Math.floor((totalSeconds % (24 * 60 * 60)) / (60 * 60));
                let minutes = Math.floor((totalSeconds % (60 * 60)) / 60);
                let seconds = Math.floor(totalSeconds % 60);

                timerDiv.innerHTML = 
                    (days < 10 ? "0" + days : days) + ":" +
                    (hours < 10 ? "0" + hours : hours) + ":" +
                    (minutes < 10 ? "0" + minutes : minutes) + ":" +
                    (seconds < 10 ? "0" + seconds : seconds);

                if (totalSeconds <= 0) {
                    clearInterval(x);
                    timerDiv.innerHTML = "ZIEHUNG LÄUFT...";
                }
                totalSeconds--;
            }, 1000);
        }
    </script>
</body>
</html>
